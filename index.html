<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Ranker</title>
    <style>
        :root {
    --primary: #3498db;
    --secondary: #2ecc71;
    --dark: #2c3e50;
    --light: #ecf0f1;
}

/* Κάνουμε το body να μην επιτρέπει scroll και να πιάνει όλη την οθόνη */
body {
    font-family: 'Segoe UI', sans-serif;
    background-color: var(--light);
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden; /* Εμποδίζει το scroll */
}

h1 { 
    color: var(--dark); 
    text-align: center; 
    margin: 10px 0;
    font-size: 1.5rem;
    height: 10vh; /* Πιάνει το 10% του ύψους */
}

/* Το container των καρτών πιάνει το υπόλοιπο 90% του ύψους */
.comparison-container {
    display: flex;
    gap: 15px;
    width: 100%;
    flex: 1;
    justify-content: center;
    align-items: stretch; /* Τεντώνει τις κάρτες για να γεμίσουν το ύψος */
    padding: 10px;
    box-sizing: border-box;
}

/* Ρυθμίσεις για κινητά: Κάθετη διάταξη */
@media (max-width: 600px) {
    .comparison-container { 
        flex-direction: column; 
    }
    .card img {
        height: 60% !important; /* Μειώνουμε λίγο την εικόνα για να χωράει το κείμενο */
    }
}

.card {
    background: white;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    flex: 1; /* Μοιράζονται τον χώρο ίσα */
    max-width: 500px;
    cursor: pointer;
    transition: transform 0.2s;
    overflow: hidden;
    text-align: center;
    border: 4px solid transparent;
    display: flex;
    flex-direction: column;
}

.card:hover {
    transform: scale(1.02);
    border-color: var(--primary);
}

.card img {
    width: 100%;
    height: 75%; /* Η εικόνα παίρνει το μεγαλύτερο μέρος */
    object-fit: cover;
}

.card h2 { 
    margin: auto; /* Κεντράρει το όνομα στον εναπομείναντα χώρο */
    color: var(--dark);
    font-size: 1.2rem;
    padding: 5px;
}

#results {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 500px;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    max-height: 80vh;
    overflow-y: auto; /* Μόνο το αποτέλεσμα κάνει scroll αν είναι μεγάλο */
}

.result-item {
    padding: 12px;
    border-bottom: 1px solid #eee;
    font-size: 1.1rem;
}

.hidden { display: none !important; }
    </style>
</head>
<body>

    <h1 id="question">Ποιον προτιμάς;</h1>

    <div id="game-ui" class="comparison-container">
        <div class="card" onclick="makeChoice(0)">
            <img id="img0" src="images/default.jpg" alt="Character 1">
            <h2 id="name0">Όνομα 1</h2>
        </div>
        
        <div class="card" onclick="makeChoice(1)">
            <img id="img1" src="images/default.jpg" alt="Character 2">
            <h2 id="name1">Όνομα 2</h2>
        </div>
    </div>

    <div id="results">
        <h2>Η Κατάταξή σου:</h2>
        <div id="list-container"></div>
        <button onclick="location.reload()" style="margin-top:20px; padding:10px; width:100%;">Επανεκκίνηση</button>
    </div>

    <script>
        // Τα δεδομένα μας
        const characters = [
            { name: "Γιώργος", img: "images/default.jpg" },
            { name: "Τάσος", img: "images/default.jpg" },
            { name: "Νίκος", img: "images/default.jpg" },
            { name: "Γιάννης", img: "images/default.jpg" },
            { name: "Μάνος", img: "images/default.jpg" },
            { name: "Δημήτρης", img: "images/default.jpg" },
            { name: "Μπάμπης", img: "images/default.jpg" }
        ];

        let sortedList = [];
        let currentIndex = 0; // Ποιον χαρακτήρα από τους αρχικούς εξετάζουμε
        let left = 0;
        let right = 0;
        let mid = 0;

        // Αρχικοποίηση
        function start() {
            sortedList.push(characters[0]);
            currentIndex = 1;
            setupNextComparison();
        }

        function setupNextComparison() {
            if (currentIndex >= characters.length) {
                showResults();
                return;
            }

            if (left > right) {
                // Βρήκαμε τη θέση! Εισαγωγή στη λίστα
                sortedList.splice(left, 0, characters[currentIndex]);
                currentIndex++;
                // Reset για τον επόμενο χαρακτήρα
                left = 0;
                right = sortedList.length - 1;
                setupNextComparison();
                return;
            }

            mid = Math.floor((left + right) / 2);
            updateUI(characters[currentIndex], sortedList[mid]);
        }

        function updateUI(charA, charB) {
            document.getElementById('name0').innerText = charA.name;
            document.getElementById('img0').src = charA.img;
            
            document.getElementById('name1').innerText = charB.name;
            document.getElementById('img1').src = charB.img;
        }

        function makeChoice(choice) {
            // Αν διαλέξαμε τον νέο χαρακτήρα (index 0 στο UI), σημαίνει ότι "κερδίζει" αυτόν της λίστας
            if (choice === 0) {
                right = mid - 1;
            } else {
                left = mid + 1;
            }
            setupNextComparison();
        }

        function showResults() {
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('question').innerText = "Τέλος!";
            const resultsDiv = document.getElementById('results');
            const container = document.getElementById('list-container');
            resultsDiv.style.display = 'block';

            sortedList.forEach((char, index) => {
                container.innerHTML += `
                    <div class="result-item">
                        <span><strong>#${index + 1}</strong> ${char.name}</span>
                    </div>`;
            });
        }

        // Εκκίνηση
        left = 0;
        right = 0; 
        start();

    </script>
</body>
</html>
