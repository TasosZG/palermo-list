<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palermo List 123</title>
    <style>
        :root {
    --primary: #3498db;
    --secondary: #2ecc71;
    --dark: #2c3e50;
    --light: #ecf0f1;
    --accent: #e67e22;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background-color: var(--light);
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

h1 { 
    color: var(--dark); 
    text-align: center; 
    margin: 5px 0;
    font-size: 1.2rem;
    height: 5vh; /* Μικρότερο ύψος για τον τίτλο */
}

.comparison-container {
    display: flex;
    gap: 10px; /* Μικρότερο κενό */
    width: 100%;
    flex: 1;
    justify-content: center;
    align-items: stretch;
    padding: 10px;
    box-sizing: border-box;
}

@media (max-width: 600px) {
    .comparison-container { 
        flex-direction: column; 
    }
    .card h2 {
        font-size: 1rem !important;
        padding: 8px 0 !important;
    }
}

.card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    flex: 1;
    max-width: 500px;
    cursor: pointer;
    transition: transform 0.2s;
    overflow: hidden;
    text-align: center;
    border: 3px solid transparent;
    display: flex;
    flex-direction: column;
    min-height: 0; /* Επιτρέπει στην κάρτα να συρρικνώνεται */
}

.card img { 
    width: 100%; 
    flex: 1; 
    /* ΑΛΛΑΓΗ ΕΔΩ: contain αντί για cover */
    object-fit: contain; 
    /* Προσθέτουμε ένα background για να μην φαίνεται άσχημο το κενό */
    background-color: #f9f9f9;
    min-height: 0;
}

.card h2 { 
    margin: 0; 
    color: var(--dark); 
    font-size: 1.1rem;
    padding: 10px 5px;
    background: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border-top: 1px solid #eee; /* Μια λεπτή γραμμή για να ξεχωρίζει το όνομα */
}

        /* Results Styles */
        #results {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 450px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-height: 85vh;
            overflow-y: auto;
        }

        .section-title {
            background: var(--dark);
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1rem;
        }

        .result-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
        }

        .rank-number {
            font-weight: bold;
            margin-right: 15px;
            color: var(--primary);
            min-width: 25px;
        }

        button.copy-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        button.copy-btn:active { transform: scale(0.95); }

        .show-more-btn {
            background: none;
            border: 1px solid var(--dark);
            color: var(--dark);
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h1 id="question">Would you rather;</h1>

    <div id="game-ui" class="comparison-container">
        <div class="card" onclick="makeChoice(0)">
            <img id="img0" src="images/default.jpg" alt="Char 1">
            <h2 id="name0">...</h2>
        </div>
        <div class="card" onclick="makeChoice(1)">
            <img id="img1" src="images/default.jpg" alt="Char 2">
            <h2 id="name1">...</h2>
        </div>
    </div>

    <div id="results">
        <h2 style="text-align:center; margin-top:0;">Αποτελέσματα</h2>
        
        <div class="section-title">
            🏆 MY TOP 5
            <button class="copy-btn" onclick="copyList('top5')">Copy</button>
        </div>
        <div id="top5-list"></div>

        <button id="btn-show-all" class="show-more-btn" onclick="toggleFullList()">Show Complete List</button>

        <div id="full-list-container" class="hidden">
            <div class="section-title">
                📜 Πλήρης Λίστα
                <button class="copy-btn" onclick="copyList('full')">Copy</button>
            </div>
            <div id="full-list"></div>
        </div>

        <button onclick="location.reload()" style="margin-top:25px; padding:10px; width:100%; border:none; background:#ccc; border-radius:8px; cursor:pointer;">Νέα Ταξινόμηση</button>
    </div>

    <script>
        const characters = [
            { name: "Πασχάλης", img: "images/broskigator.jpg" },
            { name: "Δοξάκης", img: "images/dox.jpg" },
            { name: "Lazer", img: "images/laz16.jpg" },
            { name: "Αγγελόγιαννος", img: "images/kasponti.png" },
            { name: "Μπρωκ", img: "images/brwk.jpg" },
            { name: "Folie", img: "images/folie.jpg" },
            { name: "Τάσος", img: "images/tasos.JPG" },
            { name: "Πέτρος", img: "images/pedrunk.jpg" },
            { name: "Αστέρης", img: "images/aster.jpg" },
            { name: "Κύπριος", img: "images/kip2.jpg" },
            { name: "Otto", img: "images/otto.jpg" },
            { name: "Σούκου", img: "images/soukou2.jpg" },
            { name: "Stepup", img: "images/stepup.jpg" },
            { name: "Πάνος", img: "images/panos2.jpg" },
            { name: "TheoC", img: "images/theoc.jpg" },
            { name: "Τζουμ", img: "images/tzoum2.jpg" },
            { name: "Ζαφειράκλας", img: "images/zaf.jpg" }
        ];

        let sortedList = [];
        let currentIndex = 1;
        let left = 0, right = 0, mid = 0;

        function start() {
            sortedList.push(characters[0]);
            setupNextComparison();
        }

        function setupNextComparison() {
            if (currentIndex >= characters.length) {
                showResults();
                return;
            }
            if (left > right) {
                sortedList.splice(left, 0, characters[currentIndex]);
                currentIndex++;
                left = 0;
                right = sortedList.length - 1;
                setupNextComparison();
                return;
            }
            mid = Math.floor((left + right) / 2);
            updateUI(characters[currentIndex], sortedList[mid]);
        }

        function updateUI(charA, charB) {
            document.getElementById('name0').innerText = charA.name;
            document.getElementById('img0').src = charA.img;
            document.getElementById('name1').innerText = charB.name;
            document.getElementById('img1').src = charB.img;
        }

        function makeChoice(choice) {
            if (choice === 0) right = mid - 1;
            else left = mid + 1;
            setupNextComparison();
        }

        function showResults() {
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('question').innerText = "Η Κατάταξή σου!";
            document.getElementById('results').style.display = 'block';

            const top5Div = document.getElementById('top5-list');
            const fullDiv = document.getElementById('full-list');

            sortedList.forEach((char, index) => {
                const itemHtml = `
                    <div class="result-item">
                        <span class="rank-number">#${index + 1}</span>
                        <span>${char.name}</span>
                    </div>`;
                
                if (index < 5) top5Div.innerHTML += itemHtml;
                fullDiv.innerHTML += itemHtml;
            });
        }

        function toggleFullList() {
            document.getElementById('full-list-container').classList.toggle('hidden');
            document.getElementById('btn-show-all').classList.add('hidden');
        }

        function copyList(type) {
            let text = "";
            const listToCopy = type === 'top5' ? sortedList.slice(0, 5) : sortedList;
            const title = type === 'top5' ? "--- MY TOP 5 ---" : "--- FULL LIST ---";
            
            text = title + "\n" + listToCopy.map((c, i) => `${i + 1}. ${c.name}`).join("\n");

            navigator.clipboard.writeText(text).then(() => {
                alert("Αντιγράφηκε στο πρόχειρο!");
            });
        }

        start();
    </script>
</body>
</html>
