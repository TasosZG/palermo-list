<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Η Web Εφαρμογή μου</title>
    <style>
        /* Βασικά στυλ για να φαίνεται όμορφο */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 1rem;
        }

        .image-container {
            width: 100%;
            height: 200px;
            overflow: hidden;
            border-radius: 10px;
            margin-bottom: 1rem;
            background-color: #eee;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Κάνει την εικόνα να γεμίζει το πλαίσιο χωρίς να παραμορφώνεται */
            transition: transform 0.3s ease;
        }

        img:hover {
            transform: scale(1.05); /* Εφέ μεγέθυνσης στο hover */
        }

        p {
            line-height: 1.6;
            color: #666;
        }

        .btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="image-container">
            <img src="images/poppysteki.png" alt="poppysteki">
        </div>
        
        <h1>Καλώς ήρθατε!</h1>
        <p>Αυτή είναι η πρώτη μου web εφαρμογή φιλοξενούμενη στο GitHub. Οι εικόνες δουλεύουν τέλεια!</p>
        
        <a href="#" class="btn" onclick="alert('Μπράβο! Το JavaScript δουλεύει κι αυτό!')">Πάτα με!</a>
    </div>

</body>
</html>
