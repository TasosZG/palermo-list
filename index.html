<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Ranker</title>
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2ecc71;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: var(--dark); text-align: center; }

        /* Container για τις κάρτες */
        .comparison-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 800px;
            justify-content: center;
            margin-top: 20px;
        }

        /* Responsive: Κάθετα σε κινητά, οριζόντια σε PC */
        @media (max-width: 600px) {
            .comparison-container { flex-direction: column; align-items: center; }
        }

        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 300px;
            cursor: pointer;
            transition: transform 0.2s;
            overflow: hidden;
            text-align: center;
            border: 3px solid transparent;
        }

        .card:hover {
            transform: scale(1.03);
            border-color: var(--primary);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .card h2 { margin: 15px 0; color: var(--dark); }

        #results {
            display: none;
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .result-item {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h1 id="question">Ποιον προτιμάς;</h1>

    <div id="game-ui" class="comparison-container">
        <div class="card" onclick="makeChoice(0)">
            <img id="img0" src="images/default.jpg" alt="Character 1">
            <h2 id="name0">Όνομα 1</h2>
        </div>
        
        <div class="card" onclick="makeChoice(1)">
            <img id="img1" src="images/default.jpg" alt="Character 2">
            <h2 id="name1">Όνομα 2</h2>
        </div>
    </div>

    <div id="results">
        <h2>Η Κατάταξή σου:</h2>
        <div id="list-container"></div>
        <button onclick="location.reload()" style="margin-top:20px; padding:10px; width:100%;">Επανεκκίνηση</button>
    </div>

    <script>
        // Τα δεδομένα μας
        const characters = [
            { name: "Γιώργος", img: "images/default.jpg" },
            { name: "Τάσος", img: "images/default.jpg" },
            { name: "Νίκος", img: "images/default.jpg" },
            { name: "Γιάννης", img: "images/default.jpg" },
            { name: "Μάνος", img: "images/default.jpg" },
            { name: "Δημήτρης", img: "images/default.jpg" },
            { name: "Μπάμπης", img: "images/default.jpg" }
        ];

        let sortedList = [];
        let currentIndex = 0; // Ποιον χαρακτήρα από τους αρχικούς εξετάζουμε
        let left = 0;
        let right = 0;
        let mid = 0;

        // Αρχικοποίηση
        function start() {
            sortedList.push(characters[0]);
            currentIndex = 1;
            setupNextComparison();
        }

        function setupNextComparison() {
            if (currentIndex >= characters.length) {
                showResults();
                return;
            }

            if (left > right) {
                // Βρήκαμε τη θέση! Εισαγωγή στη λίστα
                sortedList.splice(left, 0, characters[currentIndex]);
                currentIndex++;
                // Reset για τον επόμενο χαρακτήρα
                left = 0;
                right = sortedList.length - 1;
                setupNextComparison();
                return;
            }

            mid = Math.floor((left + right) / 2);
            updateUI(characters[currentIndex], sortedList[mid]);
        }

        function updateUI(charA, charB) {
            document.getElementById('name0').innerText = charA.name;
            document.getElementById('img0').src = charA.img;
            
            document.getElementById('name1').innerText = charB.name;
            document.getElementById('img1').src = charB.img;
        }

        function makeChoice(choice) {
            // Αν διαλέξαμε τον νέο χαρακτήρα (index 0 στο UI), σημαίνει ότι "κερδίζει" αυτόν της λίστας
            if (choice === 0) {
                right = mid - 1;
            } else {
                left = mid + 1;
            }
            setupNextComparison();
        }

        function showResults() {
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('question').innerText = "Τέλος!";
            const resultsDiv = document.getElementById('results');
            const container = document.getElementById('list-container');
            resultsDiv.style.display = 'block';

            sortedList.forEach((char, index) => {
                container.innerHTML += `
                    <div class="result-item">
                        <span><strong>#${index + 1}</strong> ${char.name}</span>
                    </div>`;
            });
        }

        // Εκκίνηση
        left = 0;
        right = 0; 
        start();

    </script>
</body>
</html>
